<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Shipping Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.16.9/xlsx.full.min.js"></script>
</head>
<body class="bg-gray-100 p-10">
    <div class="container mx-auto">
        <h1 class="text-2xl font-bold mb-4">Global Shipping Calculator</h1>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <!-- Column for inputs -->
            <div class="bg-white p-5 rounded shadow">
                <h2 class="font-semibold mb-2">Shipping Input</h2>
                <form id="shippingForm">
                    <label class="block">
                        Weight (kg):
                        <input type="number" id="weight" class="mt-1 p-2 border rounded w-full" required>
                    </label>
                    <label class="block mt-4">
                        Dimensions (cm):
                        <input type="text" id="dimensions" placeholder="L x W x H" class="mt-1 p-2 border rounded w-full" required>
                    </label>
                    <label class="block mt-4">
                        Shipping Method:
                        <select id="shippingMethod" class="mt-1 p-2 border rounded w-full" required>
                            <option value="standard">Standard</option>
                            <option value="express">Express</option>
                        </select>
                    </label>
                    <button type="submit" class="mt-5 bg-blue-500 text-white p-2 rounded">Calculate Shipping Cost</button>
                </form>
                <div id="result" class="mt-4 hidden"></div>
            </div>

            <!-- Column for data management -->
            <div class="bg-white p-5 rounded shadow">
                <h2 class="font-semibold mb-2">Saved Data</h2>
                <button id="loadData" class="bg-green-500 text-white p-2 rounded">Load Data from Sheet</button>
                <div id="savedData" class="mt-4"></div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('shippingForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const weight = document.getElementById('weight').value;
            const dimensions = document.getElementById('dimensions').value;
            const shippingMethod = document.getElementById('shippingMethod').value;
            // Calculate volumetric weight and shipping cost based on the input
            const [length, width, height] = dimensions.split('x').map(Number);
            const volumetricWeight = (length * width * height) / 5000;
            const cost = shippingMethod === 'express' ? weight * 5 + volumetricWeight * 2 : weight * 3 + volumetricWeight;
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = `Shipping Cost: $${cost.toFixed(2)}`;
            resultDiv.classList.remove('hidden');
            // Store result in localStorage
            localStorage.setItem('lastCalculation', JSON.stringify({ weight, dimensions, shippingMethod, cost }));
        });

        document.getElementById('loadData').addEventListener('click', function () {
            // Load data from SheetJS (for example)
            const fileInput = document.createElement('input');
            fileInput.type = 'file';
            fileInput.accept = '.xlsx';
            fileInput.onchange = e => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (event) => {
                    const data = new Uint8Array(event.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    let html = '<ul>';
                    workbook.SheetNames.forEach((sheetName) => {
                        const sheet = workbook.Sheets[sheetName];
                        const range = XLSX.utils.decode_range(sheet['!ref']);
                        for (let r = range.s.r; r <= range.e.r; r++) {
                            html += '<li>' + XLSX.utils.sheet_to_csv(sheet, { header: 1 }).split('\n')[r] + '</li>';
                        }
                    });
                    html += '</ul>';
                    document.getElementById('savedData').innerHTML = html;
                };
                reader.readAsArrayBuffer(file);
            };
            fileInput.click();
        });
    </script>
</body>
</html>
