<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shipping Cost Calculator</title>
</head>
<body>
    <h1>Calculate Shipping Cost</h1>
    <form id="calcForm">
        <label for="dimensions">Enter dimensions (length x width x height):</label>
        <input type="text" id="dimensions" name="dimensions" required>
        <button type="submit">Calculate</button>
    </form>
    <div id="result"></div>
    <script>
        document.getElementById('calcForm').onsubmit = function(event) {
            event.preventDefault();
            const dimensions = document.getElementById('dimensions').value;
            // Fixed line 54
            const [length, width, height] = dimensions.split(/\s*x\s*/i).map(Number);
            const volume = length * width * height;
            document.getElementById('result').innerText = `Volume: ${volume} cubic units`;
        };
    </script>
</body>
</html>
